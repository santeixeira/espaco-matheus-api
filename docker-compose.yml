version: "3.9"
services:
  db:
    image: mysql
    platform: linux/x86_64
    container_name: database_blackcode
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "16345578tT@"
      MYSQL_DATABASE: "lcf"
    ports:
      - '3330:3306'
  lcf:
    build:
      context: .
      dockerfile: Dockerfile
    image: "lcf:latest"
    container_name: "lcf_api"
    depends_on:
      - db